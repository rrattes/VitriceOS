LABEL vitriceos64
TEXT HELP
Boot VitriceOS on BIOS.
It allows you to install VitriceOS or perform system maintenance.
ENDTEXT
MENU LABEL VitriceOS (x86_64, BIOS)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% rootdelay=5

# Accessibility boot option
LABEL vitriceos64speech
TEXT HELP
Boot VitriceOS on BIOS with speakup screen reader.
It allows you to install VitriceOS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL VitriceOS (x86_64, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
